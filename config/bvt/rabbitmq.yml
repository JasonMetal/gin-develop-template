# RabbitMQ 配置 - BVT 环境

host: "rabbitmq-bvt.example.com"
port: 5672
username: "bvt_user"
password: "bvt_password"
vhost: "/bvt"

pool:
  max_open: 20
  max_idle: 10
  max_lifetime: 7200

producer:
  confirm_mode: true
  mandatory: true
  immediate: false

consumer:
  auto_ack: false
  prefetch_count: 20
  prefetch_size: 0

reconnect:
  max_retries: 10
  interval: 3

queue:
  durable: true
  auto_delete: false
  exclusive: false
  no_wait: false

exchange:
  durable: true
  auto_delete: false
  internal: false
  no_wait: false
